<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloaty WASM - Size Profiler</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        #drop-zone {
            border: 2px dashed #3498db;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            background-color: #fff;
            transition: background-color 0.3s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #drop-zone.dragover {
            background-color: #e1f5fe;
        }
        #output-container {
            background-color: #2d3436;
            color: #dfe6e9;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            overflow-x: auto;
            min-height: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        select, input, button {
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        #status {
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Bloaty WASM Size Profiler</h1>

    <div id="status">Loading WASM module...</div>

    <div id="drop-zone">
        Drag and drop a binary file here (ELF, Mach-O, PE, or WASM)
        <br>or click to select a file
        <input type="file" id="file-input" style="display: none;">
    </div>

    <div class="controls">
        <label for="data-source">Data Source:</label>
        <select id="data-source">
            <option value="compileunits">Compile Units</option>
            <option value="symbols">Symbols</option>
            <option value="sections">Sections</option>
            <option value="segments">Segments</option>
            <option value="files">Files</option>
        </select>

        <button id="run-btn" disabled>Run Bloaty</button>
    </div>

    <div id="output-container">Output will appear here...</div>

    <script src="bloaty.js"></script>
    <script src="example.js"></script>
</body>
</html>
